<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Run Analysis</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e4ed;
      --muted:   #7b7f96;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size:14px; padding:20px }
    .container { max-width:1200px; margin:0 auto }
    h1 { font-size:20px; margin-bottom:8px }
    .muted { color:var(--muted); margin-bottom:12px }
    #controls { margin-bottom:12px }
    #chart-container { background: var(--surface); border:1px solid var(--border); border-radius:6px; padding:12px }
    .info { margin-top:8px; color:var(--muted) }
    button, label { background:transparent; color:var(--text); border:1px solid var(--border); padding:8px 10px; border-radius:6px; cursor:pointer }
    input[type=file] { display:none }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">Single Run Analysis</h1>
    <div class="muted" id="load-msg">Load a GPX file (produced by Strava or from the codebase) to analyze a single run.</div>

    <div id="controls">
      <label for="gpxfile">Load data</label>
      <input id="gpxfile" type="file" accept=".gpx" />
      <span class="info" id="breaks-info"></span>
    </div>

    <div id="chart-container"><div id="chart" style="height:600px"></div></div>
  </div>

  <script>
  // Holds the numeric ID extracted from the loaded GPX filename (e.g. "12345678.gpx" -> "12345678")
  let currentRunId = null;
  // Holds the run name from the GPX file's <trk><name> element (e.g. "Short Wednesday")
  let currentRunName = null;

  // Colors matching existing theme
  const COLORS = {
    dist: '#2ecc71',      // green
    hr:   '#e74c3c',      // red
    pace: '#f1c40f',      // yellow
    median: '#9b59b6'     // purple
  };

  // Haversine distance in meters
  function haversine(lat1, lon1, lat2, lon2) {
    const toRad = a => a * Math.PI / 180;
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function secondsToHMS(sec) {
    const s = Math.floor(sec % 60).toString().padStart(2,'0');
    const m = Math.floor((sec/60) % 60).toString().padStart(2,'0');
    const h = Math.floor(sec/3600).toString().padStart(2,'0');
    return (h !== '00' ? h+':' : '') + m + ':' + s;
  }

  function median(arr){
    const a = arr.filter(v => v!=null).slice().sort((x,y)=>x-y);
    if(!a.length) return null;
    const mid = Math.floor(a.length/2);
    return a.length%2 ? a[mid] : (a[mid-1]+a[mid])/2;
  }

  function extractGPXName(gpxText){
    const parser = new DOMParser();
    const xml = parser.parseFromString(gpxText, 'application/xml');
    const nameNodes = xml.getElementsByTagName('name');
    return nameNodes.length ? nameNodes[0].textContent.trim() : null;
  }

  function parseGPXText(gpxText){
    const parser = new DOMParser();
    const xml = parser.parseFromString(gpxText, 'application/xml');
    const trkpts = Array.from(xml.getElementsByTagName('trkpt'));
    const pts = trkpts.map(node => {
      const lat = parseFloat(node.getAttribute('lat'));
      const lon = parseFloat(node.getAttribute('lon'));
      const timeNode = node.getElementsByTagName('time')[0];
      const time = timeNode ? new Date(timeNode.textContent) : null;
      // elevation (meters)
      let ele = null;
      const eleN = node.getElementsByTagName('ele');
      if(eleN && eleN.length) ele = parseFloat(eleN[0].textContent);
      // Try HR in known extension namespaces
      let hr = null;
      const hrs = node.getElementsByTagName('gpxtpx:hr');
      if(hrs && hrs.length) hr = parseInt(hrs[0].textContent);
      else {
        // maybe plain <hr>
        const hr2 = node.getElementsByTagName('hr');
        if(hr2 && hr2.length) hr = parseInt(hr2[0].textContent);
      }
      return { lat, lon, time, hr, ele };
    }).filter(p => p.time !== null);
    return pts;
  }

  function buildFromPoints(points){
    if(!points.length) return null;
    const times = [];
    const elapsed = []; // seconds
    const cumdist = []; // km
    const hr = [];
    const pace = []; // min/km instantaneous
    const median1min = [];

    let base = points[0].time;
    let totalDistM = 0;
    const latArr = [];
    const lonArr = [];
    const eleArr = [];
    const dtRaw = [0]; // seconds since previous sample, per point (used to detect real data gaps)
    // Tracks the index of the last point whose position actually differed from its
    // predecessor (i.e. the last confirmed "moved" point). Used so that pace after a
    // run of duplicate coordinates is computed using the *real* elapsed time since the
    // runner was last at a different position, not just the time since the previous
    // (duplicate) sample. Without this, a duplicate coordinate causes the next real
    // movement to look like it happened twice as fast/slow as it actually did, which
    // can push the computed pace over the break threshold and get the point wrongly
    // treated as missing data.
    let lastMovedIdx = 0;
    for(let i=0;i<points.length;i++){
      const p = points[i];
      const t = (p.time - base)/1000.0;
      times.push(new Date(p.time));
      elapsed.push(t);
      hr.push(p.hr != null ? p.hr : null);
      latArr.push(p.lat);
      lonArr.push(p.lon);
      eleArr.push(p.ele != null ? p.ele : null);
      if(i===0) { cumdist.push(0); pace.push(null); }
      else {
        const prev = points[i-1];
        const d = haversine(prev.lat, prev.lon, p.lat, p.lon);
        totalDistM += d;
        cumdist.push(totalDistM/1000.0);
        dtRaw.push((p.time - prev.time)/1000.0);
        if(d > 0){
          // Real movement: distance is always accurate (d is exact regardless of any
          // duplicate points in between), but the time must be measured since the last
          // point that was actually at a different position, not just the previous sample.
          const dtSinceMoved = (p.time - points[lastMovedIdx].time) / 1000.0;
          if(dtSinceMoved > 0){
            const secondsPerKm = dtSinceMoved * 1000.0 / d;
            pace.push(secondsPerKm / 60.0);
          } else {
            pace.push(null);
          }
          lastMovedIdx = i;
        } else {
          // Duplicate coordinate: no distance covered, so an instantaneous pace can't be
          // determined for this sample alone. Leave as null; the break-detection/fill
          // logic below will interpolate across it using the real distance and time from
          // the last valid point to the next valid point.
          pace.push(null);
        }
      }
    }

    const totalTimeSec = (points[points.length-1].time - base)/1000.0;
    const totalDistKm = totalDistM/1000.0;
    const avgPaceMinPerKm = totalDistKm>0 ? (totalTimeSec/totalDistKm)/60.0 : null;

    // Missing-value handling: a null pace value means no distance was measured for that
    // sample (duplicate GPS coordinate). Short runs of these are just noise -- left alone
    // as gaps. Longer runs are filled with a single CONSTANT pace value: the real distance
    // and time between the last valid sample before the run and the next valid sample after
    // it (i.e. pace as a function of distance/time bridging the gap), not an interpolated
    // ramp -- the whole run gets the same one number.
    const missingGapThreshold = 10; // seconds
    {
      let i = 0;
      while(i < pace.length){
        if(pace[i] != null){ i++; continue; }
        let start = i, end = i;
        while(end+1 < pace.length && pace[end+1]==null) end++;
        const before = start-1, after = end+1;
        if(before>=0 && after<pace.length){
          const gapDuration = elapsed[after] - elapsed[before];
          if(gapDuration >= missingGapThreshold){
            const distKm = cumdist[after] - cumdist[before];
            if(distKm>0 && gapDuration>0){
              const constPace = (gapDuration / distKm) / 60.0;
              for(let j=start;j<=end;j++) pace[j] = constPace;
            }
            // if distance is also ~0 across the gap (no computable pace), leave as null
          }
          // else: gap shorter than the threshold -- ignored, left as a null gap
        }
        // else: run touches the very start/end of the recording with no boundary on one
        // side to bridge against -- left as a null gap
        i = end + 1;
      }
    }

    // initial median (used to guess activity type for break detection)
    const tempMedianWindow = [];
    for(let i=0;i<elapsed.length;i++){
      const window = [];
      for(let j=0;j<pace.length;j++){
        if(pace[j]==null) continue;
        if(Math.abs(elapsed[i]-elapsed[j])<=30) window.push(pace[j]);
      }
      const mv = median(window);
      median1min.push(mv);
      if(mv!=null) tempMedianWindow.push(mv);
    }
    const medianPaceInitial = median(tempMedianWindow);
    const isRunningInitial = medianPaceInitial != null && medianPaceInitial < 8.0;

    // Break-detection scheme:
    // 1) A point is a break CANDIDATE if the MEDIAN pace within a T=30s window centered on
    //    it is over the activity's threshold. Since the median is the middle value, a median
    //    above threshold means at least half the samples in that window are over threshold --
    //    directly implementing "most of the samples over threshold for T seconds" without
    //    letting a single noisy/bad sample flip the candidacy of an otherwise sustained slowdown.
    // 2) Consecutive candidate points are grouped into one candidate segment.
    // 3) Only segments lasting at least T=30s are considered further (short blips are ignored).
    // 4) Double-check: compute the pace across the whole segment using only the real,
    //    measured points immediately before and after it (distance/time bracketing the
    //    segment). Only if that bracketing pace is ALSO over the threshold do we confirm
    //    it as a real break (used for the background marker and break count). Otherwise it's
    //    treated as bad data mid-stream, not a pause, and the pace is smoothed across it.
    const breakThreshold = isRunningInitial ? 10.0 : 40.0; // 10 min/km for running, 40 min/km for walking
    const T = 30; // seconds
    const halfT = T / 2;
    const rawSamplingGapThreshold = 10; // seconds -- matches the missing-value gap threshold

    function windowMedianPace(i){
      const window = [];
      for(let j=0;j<pace.length;j++){
        if(pace[j]==null) continue;
        if(Math.abs(elapsed[i]-elapsed[j]) <= halfT) window.push(pace[j]);
      }
      return median(window);
    }
    const isCandidate = (i) => {
      const wm = windowMedianPace(i);
      if(wm == null || wm > breakThreshold) return true;
      // The windowed median can look fine even right after a genuine device dropout
      // (no samples recorded for a while), because it gets diluted by real, fast samples
      // just past the gap. But we have no idea what happened *during* the gap, and the
      // boundary-to-boundary pace across it says slow -- so a real raw sampling gap with a
      // slow bracketing pace always counts as a candidate, regardless of the windowed median.
      if(i>0){
        const gapDt = elapsed[i] - elapsed[i-1];
        if(gapDt >= rawSamplingGapThreshold){
          const gapDistKm = cumdist[i] - cumdist[i-1];
          const gapPace = gapDistKm>0 ? (gapDt/gapDistKm)/60.0 : Infinity;
          if(gapPace > breakThreshold) return true;
        }
      }
      return false;
    };

    const rawSegments = [];
    let inSeg = false; let segStart = null;
    for(let i=0;i<pace.length;i++){
      if(isCandidate(i) && !inSeg){ inSeg=true; segStart=i; }
      if(!isCandidate(i) && inSeg){ inSeg=false; rawSegments.push([segStart, i-1]); segStart=null; }
    }
    if(inSeg && segStart!=null) rawSegments.push([segStart, pace.length-1]);

    // only segments lasting >= T seconds are even considered as break candidates
    const longEnough = rawSegments.filter(b => (elapsed[b[1]] - elapsed[b[0]]) >= T);

    const confirmedBreaks = [];
    for(const b of longEnough){
      const s = b[0], e = b[1];
      const before = s-1, after = e+1;

      let paceAcross = null;
      if(before>=0 && after<pace.length){
        const distKm = cumdist[after] - cumdist[before];
        const timeSec = elapsed[after] - elapsed[before];
        if(distKm>0 && timeSec>0){
          paceAcross = (timeSec / distKm) / 60.0;
        }
      }
      const isRealBreak = paceAcross != null && paceAcross > breakThreshold;
      if(isRealBreak) confirmedBreaks.push(b);
    }

    // merge confirmed breaks that are close together (gap <= 60s)
    const breaks = [];
    for(const b of confirmedBreaks){
      if(breaks.length === 0){ breaks.push(b); }
      else {
        const lastBreak = breaks[breaks.length-1];
        const gap = elapsed[b[0]] - elapsed[lastBreak[1]];
        if(gap <= 60){ lastBreak[1] = b[1]; } // merge
        else { breaks.push(b); }
      }
    }
    const filteredBreaks = breaks;

    // recompute median1min using the (possibly) filled pace array, but excluding samples
    // that fall inside a confirmed break from anyone else's rolling window. A break's
    // interior pace values (near-zero movement over many seconds, or a gap-filled constant)
    // are real but extreme -- letting them bleed into a nearby non-break point's ±30s window
    // would otherwise make that point's median swing wildly as the window slides past the
    // break, producing an artificial cliff/decline right at the break boundary even though
    // that point itself is outside the break.
    const isInAnyBreak = (i) => filteredBreaks.some(b => i >= b[0] && i <= b[1]);
    const paceForMedian = pace.map((p, i) => isInAnyBreak(i) ? null : p);

    median1min.length = 0;
    const tempMedianWindow2 = [];
    for(let i=0;i<elapsed.length;i++){
      const window = [];
      for(let j=0;j<paceForMedian.length;j++){
        if(paceForMedian[j]==null) continue;
        if(Math.abs(elapsed[i]-elapsed[j])<=30) window.push(paceForMedian[j]);
      }
      const mv = median(window);
      median1min.push(mv);
      if(mv!=null) tempMedianWindow2.push(mv);
    }
    const medianPace = median(tempMedianWindow2);
    const isRunning = medianPace != null && medianPace < 8.0;

    // For walking only: smooth the pace time-series with a centered 10s window (±5s)
    // before computing the displayed median (±30s). This reduces jitter in the
    // median trace for slow walks where instantaneous pace is noisy.
    if(!isRunning){
      const pfm = paceForMedian;
      const smoothed = pfm.map((_,i) => {
        const window = [];
        for(let j=0;j<pfm.length;j++){
          if(pfm[j]==null) continue;
          if(Math.abs(elapsed[i]-elapsed[j]) <= 5) window.push(pfm[j]);
        }
        return window.length ? window.reduce((a,b)=>a+b,0)/window.length : null;
      });
      // recompute median1min using the smoothed pace series
      median1min.length = 0;
      tempMedianWindow2.length = 0;
      for(let i=0;i<elapsed.length;i++){
        const window = [];
        for(let j=0;j<smoothed.length;j++){
          if(smoothed[j]==null) continue;
          if(Math.abs(elapsed[i]-elapsed[j])<=30) window.push(smoothed[j]);
        }
        const mv = median(window);
        median1min.push(mv);
        if(mv!=null) tempMedianWindow2.push(mv);
      }
    }

    // A genuine raw sampling gap (the recording device didn't log anything for a while,
    // e.g. an auto-pause dropout) has no data at all in between -- connecting the two
    // flanking points with a straight line implies a smooth trend that was never measured.
    // Insert one null-valued vertex into each gap so the pace/median/HR lines visually
    // break there instead (distance is left continuous, since accumulating distance
    // linearly across a gap is still a reasonable assumption).
    const gapIndices = [];
    for(let i=1;i<elapsed.length;i++){
      if(elapsed[i]-elapsed[i-1] >= rawSamplingGapThreshold) gapIndices.push(i);
    }
    for(let k=gapIndices.length-1;k>=0;k--){
      const i = gapIndices[k];
      const midElapsed = (elapsed[i-1]+elapsed[i])/2;
      const midTime = new Date(times[i-1].getTime() + (times[i].getTime()-times[i-1].getTime())/2);
      const midDist = (cumdist[i-1]+cumdist[i])/2;
      const midLat = (latArr[i-1]+latArr[i])/2;
      const midLon = (lonArr[i-1]+lonArr[i])/2;
      times.splice(i,0,midTime);
      elapsed.splice(i,0,midElapsed);
      cumdist.splice(i,0,midDist);
      hr.splice(i,0,null);
      pace.splice(i,0,null);
      median1min.splice(i,0,null);
      latArr.splice(i,0,midLat);
      lonArr.splice(i,0,midLon);
      // interpolate elevation for the inserted midpoint if available
      const midEle = (eleArr[i-1] != null && eleArr[i] != null) ? (eleArr[i-1] + eleArr[i]) / 2 : null;
      eleArr.splice(i,0,midEle);
      // shift break index ranges to account for the newly-inserted row
      for(const b of filteredBreaks){
        if(b[0] >= i) b[0] += 1;
        if(b[1] >= i) b[1] += 1;
      }
    }

    return { times, elapsed, cumdist, hr, pace, median1min, totalTimeSec, totalDistKm, avgPaceMinPerKm, breaks: filteredBreaks, isRunning, medianPace, latArr, lonArr, eleArr };
  }

  function drawChart(data){
    const { times, cumdist, hr, pace, median1min, totalTimeSec, totalDistKm, avgPaceMinPerKm, breaks, isRunning, latArr, lonArr, eleArr } = data;

    // Hide the median line during breaks (it's not meaningful across a break), but
    // keep the raw per-point pace markers visible everywhere, including during breaks.
    const medianVisible = median1min.map((p, i) => {
      for(const b of breaks){
        if(i >= b[0] && i <= b[1]) return null;
      }
      return p;
    });

    // coords for hover
    const coords = times.map((_,i) => (latArr && lonArr ? [latArr[i], lonArr[i]] : [null, null]));

    // Calculate min/max elevation for rescaling display and ytick labels
    const validEle = eleArr.filter(e => e != null);
    const minEle = validEle.length ? Math.min(...validEle) : 0;
    const maxEle = validEle.length ? Math.max(...validEle) : 200;
    const eleRange = maxEle - minEle;
    // Rescale elevation to 0-200 for display (fills the axis)
    const eleScaled = eleArr.map(e =>
      e != null ? (e - minEle) / eleRange * 200 : null
    );
    // Create customdata that includes original elevation for hover
    const coordsWithEle = times.map((_,i) => [
      latArr && lonArr ? [latArr[i], lonArr[i]] : [null, null],
      eleArr[i]
    ]);

    // For walking, convert pace (min/km) to speed (km/h)
    const paceDisplay = isRunning ? pace : pace.map(p => p != null ? 60.0 / p : null);
    const medianDisplay = isRunning ? medianVisible : medianVisible.map(p => p != null ? 60.0 / p : null);

    let tracePace, traceMedian, traceRaw;
    if(isRunning){
      traceRaw = { name:'', x:times, y:pace, customdata:coords, mode:'markers', marker:{color:COLORS.pace, size:1, opacity:0.8}, hovertemplate:'%{x|%H:%M:%S}<br>Pace: %{y:.2f} min/km<br>Lat: %{customdata[0]:.5f} Lon: %{customdata[1]:.5f}<extra></extra>', showlegend:false };
      traceMedian = { name:'pace (median ±30s)', x:times, y:medianDisplay, customdata:coords, mode:'lines', line:{color:COLORS.pace, width:3}, connectgaps:false, hovertemplate:'%{x|%H:%M:%S}<br>Median: %{y:.2f} min/km<br>Lat: %{customdata[0]:.5f} Lon: %{customdata[1]:.5f}<extra></extra>' };
    } else {
      traceRaw = { name:'', x:times, y:paceDisplay, customdata:coords, mode:'markers', marker:{color:COLORS.pace, size:1, opacity:0.8}, hovertemplate:'%{x|%H:%M:%S}<br>Speed: %{y:.2f} km/h<br>Lat: %{customdata[0]:.5f} Lon: %{customdata[1]:.5f}<extra></extra>', showlegend:false };
      traceMedian = { name:'speed (median ±30s)', x:times, y:medianDisplay, customdata:coords, mode:'lines', line:{color:COLORS.pace, width:3}, connectgaps:false, hovertemplate:'%{x|%H:%M:%S}<br>Median: %{y:.2f} km/h<br>Lat: %{customdata[0]:.5f} Lon: %{customdata[1]:.5f}<extra></extra>' };
    }

    const traceDist = { name:'Distance (km)', x:times, y:cumdist, customdata:coords, mode:'lines', line:{color:COLORS.dist, width:3}, hovertemplate:'%{x|%H:%M:%S}<br>Distance: %{y:.3f} km<br>Lat: %{customdata[0]:.5f} Lon: %{customdata[1]:.5f}<extra></extra>' };
    // HR will use a separate right-side axis (y3). Elevation is plotted as a brown area on y2.
    const traceHR = { name:'Heart rate (bpm)', x:times, y:hr, customdata:coords, mode:'lines', line:{color:COLORS.hr, width:1.5}, yaxis:'y3', hovertemplate:'%{x|%H:%M:%S}<br>HR: %{y} bpm<br>Lat: %{customdata[0]:.5f} Lon: %{customdata[1]:.5f}<extra></extra>' };

    // elevation area (brown) plotted on right y-axis (y2)
    const traceEle = { name: 'Elevation (m)', x: times, y: eleScaled, customdata: coordsWithEle, fill: 'tozeroy', fillcolor: 'rgba(139,69,19,0.25)', line: {color: 'rgba(0,0,0,0)' }, yaxis: 'y2', hovertemplate:'%{x|%H:%M:%S}<br>Elevation: %{customdata[1]:.1f} m<extra></extra>', showlegend:true };

    // build background shapes for breaks (brighter: 20% increase in alpha)
    const shapes = breaks.map(b => {
      const x0 = times[b[0]];
      const x1 = times[b[1]];
      return { type:'rect', xref:'x', yref:'paper', x0:x0, x1:x1, y0:0, y1:1, fillcolor:'rgba(155,89,182,0.28)', line:{width:0} };
    });

    // Legend-only trace for break entry: use an opaque swatch so it's visible on dark backgrounds.
    const traceBreakLegend = {
      name: 'Break',
      x: [times[0]],
      y: [0],
      mode: 'markers',
      marker: {
        color: 'rgba(155,89,182,0.95)',
        size: 11,
        symbol: 'square',
        line: { color: 'rgba(226,228,237,0.7)', width: 1 }
      },
      visible: 'legendonly',
      hoverinfo: 'skip',
      showlegend: true
    };

    // Format title
    const distanceStr = Math.round(totalDistKm * 1000).toLocaleString() + ' m';
    const paceStr = avgPaceMinPerKm ? (Math.floor(avgPaceMinPerKm)+':'+String(Math.round((avgPaceMinPerKm%1)*60)).padStart(2,'0')+' min/km') : '';
    const namePrefix = currentRunName ? `${currentRunName} | ` : '';
    const titleText = isRunning ?
      `${namePrefix}Total ${secondsToHMS(totalTimeSec)} | ${distanceStr} | ${paceStr}` :
      `${namePrefix}Total ${secondsToHMS(totalTimeSec)} | ${distanceStr}`;
    document.getElementById('title').textContent = titleText;
    document.title = currentRunName ? `Single Run Analysis - ${currentRunName}` : 'Single Run Analysis';

    // Replace the initial "load a file" instructions with the activity number once data is loaded
    const loadMsgEl = document.getElementById('load-msg');
    if(loadMsgEl) loadMsgEl.textContent = currentRunId ? `#${currentRunId}` : '';

    // Format info line with date, start time, activity number (using times[0])
    const startTime = times[0];
    const dateStr = startTime.toLocaleDateString('en-GB');
    const timeStr = startTime.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const activityTypeStr = isRunning ? 'Running' : 'Walking';
    document.getElementById('breaks-info').textContent = `${dateStr} ${timeStr} ${activityTypeStr} (${breaks.length} break(s))`;

    let traces, layout;
    if(isRunning){
       // elevation behind others, HR included on a separate right axis (y3)
       traces = [traceEle, traceRaw, traceMedian, traceDist, traceHR, traceBreakLegend];
      layout = {
        hovermode:'closest',
        plot_bgcolor:'rgba(0,0,0,0)', paper_bgcolor:'rgba(0,0,0,0)',
        font:{ color: '#e2e4ed', family: 'Inter, system-ui' },
        xaxis:{ title:'Time', gridcolor:'#2a2d3a', tickformat:'%H:%M:%S' },
        yaxis:{ title:'Pace (min/km) / Distance (km)', range:[0,20], gridcolor:'#2a2d3a' },
        // elevation on the right axis (0..200), no grid, show only ticks at 0 and 200
        yaxis2:{ overlaying:'y', side:'right', range:[0,200], showgrid:false, tickmode:'array', tickvals:[0,200], ticktext:[Math.round(minEle)+' m', Math.round(maxEle)+' m'], tickfont:{color:'#8B4513'} },
         // HR on a separate right axis, show ticks at 50, 100, 150 to avoid hiding elevation ticks at 0 and 200
         yaxis3:{ title:'HR (bpm)', overlaying:'y', side:'right', anchor:'x', position:0.95, gridcolor:'#2a2d3a', range:[0, 200], tickmode:'array', tickvals:[50, 100, 150] },
        shapes: shapes,
        legend:{ orientation:'v', x:0.01, y:0.99, xanchor:'left', yanchor:'top', bgcolor:'rgba(26,29,39,0.75)', bordercolor:'#2a2d3a', borderwidth:1 },
        margin:{ l:60, r:120, t:40, b:80 }, height:600,
        hoverlabel:{ bgcolor: '#1a1d27', bordercolor: '#6c63ff', font: {color: '#e2e4ed'} }
      };
    } else {
       // walking: elevation shown on right axis, HR not included by default
       traces = [traceEle, traceRaw, traceMedian, traceDist, traceBreakLegend];
      layout = {
        hovermode:'closest',
        plot_bgcolor:'rgba(0,0,0,0)', paper_bgcolor:'rgba(0,0,0,0)',
        font:{ color: '#e2e4ed', family: 'Inter, system-ui' },
        xaxis:{ title:'Time', gridcolor:'#2a2d3a', tickformat:'%H:%M:%S' },
         yaxis:{ title:'Speed (km/h) / Distance (km)', range:[0,10], gridcolor:'#2a2d3a' },
         yaxis2:{ overlaying:'y', side:'right', range:[0,200], showgrid:false, tickmode:'array', tickvals:[0,200], ticktext:[Math.round(minEle)+' m', Math.round(maxEle)+' m'], tickfont:{color:'#8B4513'} },
        shapes: shapes,
        legend:{ orientation:'v', x:0.01, y:0.99, xanchor:'left', yanchor:'top', bgcolor:'rgba(26,29,39,0.75)', bordercolor:'#2a2d3a', borderwidth:1 },
        margin:{ l:60, r:100, t:40, b:80 }, height:600,
        hoverlabel:{ bgcolor: '#1a1d27', bordercolor: '#6c63ff', font: {color: '#e2e4ed'} }
      };
    }

    Plotly.react('chart', traces, layout, {responsive:true});
  }

  document.getElementById('gpxfile').addEventListener('change', (ev) => {
    const f = ev.target.files[0];
    if(!f) return;
    const idMatch = f.name.match(/\d+/);
    currentRunId = idMatch ? idMatch[0] : null;
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const gpxText = e.target.result;
        currentRunName = extractGPXName(gpxText);
        const pts = parseGPXText(gpxText);
        const data = buildFromPoints(pts);
        if(!data) { alert('No time points found in GPX.'); return; }
        drawChart(data);
      } catch(err){
        console.error(err); alert('Failed to parse GPX: '+err.message);
      }
    };
    reader.readAsText(f);
  });

  // click the label to open file dialog when user clicks "Load data" label
  document.querySelector('label[for="gpxfile"]').addEventListener('click', ()=> document.getElementById('gpxfile').click());
  </script>
</body>
</html>
